<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Cabecera del sistema -->
    <header>
        <h1>RCS - Sistema de Cotización</h1>
    </header>

    <!-- Núcleo de la aplicación -->
    <main>
        <!-- Sección 1: El Formulario del cliente -->
        <section id="seccion-cotizador">
            <h2>Configura tu pedido</h2>
            <p>Selecciona las características de tus tazas sublimables.</p>

            <form id="form-cotizador">
                <!-- Aquí programaremos los selectores avanzados de las tazas -->
                <form id="form-cotizador">
                    <!-- Grupo 1: Selector del tipo de taza -->
                    <div class="grupo-control">
                        <label for="tipo-taza">Modelo de Taza:</label>
                        <select id="tipo-taza" name="tipoTaza" required>
                            <option value="" disabled selected>-- Elige un modelo --</option>
                            <option value="blanca_11oz">Taza Blanca de 11 oz</option>
                            <option value="conica_15oz">Taza Cónica de 15 oz</option>
                            <option value="magica">Taza Mágica</option>
                        </select>
                    </div>

                    <!-- Grupo 2: Campo numérico para la cantidad -->
                    <div class="grupo-control">
                        <label for="cantidad">Cantidad de unidades:</label>
                        <input type="number" id="cantidad" name="cantidad" min="1" placeholder="Ej. 12" required>
                    </div>

                    <!-- Botón de acción -->
                    <button type="submit" id="btn-calcular">Calcular Cotización</button>
                </form>
            </form>
        </section>

        <!-- Sección 2: El Panel donde se mostrará el precio final -->
        <section id="seccion-resultado">
            <h2>Resumen de Cotización</h2>
            <div id="pantalla-precio">
                <!-- Aquí JavaScript inyectará el precio mañana -->
                <p>Selecciona tus opciones para calcular el total.</p>
            </div>
        </section>
    </main>

    <!-- Pie de página profesional -->
    <footer>
        <p>&copy; 2026 RCS Merchandising. Todos los derechos reservados.</p>
    </footer>

</body>

</html>
